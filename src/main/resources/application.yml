server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/face_attendance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 自定义配置
face:
  python-api: http://localhost:5000 # Python服务地址
  upload-path: C:\graduate\shixi # 图片上传存储路径
